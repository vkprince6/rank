<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codeboosters Tech — LEADERBOARD_CONTROL</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="climb-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <span class="top-bar-brand">CODEBOOSTERS_TECH</span>
      </div>
      <div class="top-bar-right">
        <button id="topRefreshBtn" class="top-bar-btn" title="Refresh" onclick="document.getElementById('refreshBtn').click()">
          <span class="material-symbols-outlined">refresh</span>
        </button>
      </div>
    </header>

    <div class="page-inner">
      <!-- Page Header -->
      <div class="page-header">
        <div>
          <div class="page-header-badge">LEADERBOARD_SYSTEM</div>
          <h1 class="page-header-title">RANKING_BOARD</h1>
        </div>
      </div>

      <!-- College Row -->
      <div class="college-row">
        <span id="collegeName" class="college-name"></span>
        <input id="collegeInput" class="college-input" type="text" placeholder="Enter college / institution name" maxlength="80" />
        <button id="editBtn" class="edit-btn" title="Edit">
          <span class="material-symbols-outlined" style="font-size:18px;">edit</span>
        </button>
        <button id="saveBtn" class="save-btn" title="Save">
          <span class="material-symbols-outlined" style="font-size:18px;">check</span>
        </button>
        <button id="cancelBtn" class="cancel-btn" title="Cancel">
          <span class="material-symbols-outlined" style="font-size:18px;">close</span>
        </button>
      </div>

      <!-- Status Bar -->
      <div class="status-bar" id="statusBar">
        <span class="live-dot"></span>
        <span id="statusText">Loading…</span>
      </div>

      <!-- Top 3 Podium -->
      <div id="podium" class="podium-grid"></div>

      <!-- Leaderboard Table -->
      <div class="leaderboard" id="leaderboard">
        <div class="lb-header">
          <span class="lb-header-col rank-col">Rank</span>
          <span class="lb-header-col name-col">Competitor Name</span>
          <span class="lb-header-col score-col">Score</span>
        </div>
        <div id="lbBody" class="lb-body"></div>
        <p id="emptyMsg" class="empty-msg">No data yet. Add entries in the Google Sheet.</p>
      </div>

      <!-- Refresh -->
      <div class="refresh-row">
        <button id="refreshBtn" class="btn">
          <span class="material-symbols-outlined" style="font-size:16px;margin-right:6px;">refresh</span>
          Reload Data
        </button>
      </div>

      <!-- Footer -->
      <footer>Powered by Codeboosters Tech — VEERAKUMAR C B</footer>
    </div>
  </main>

  <script src="animations.js"></script>
  <script src="climb.js"></script>
  <script src="app.js"></script>
</body>
</html>
